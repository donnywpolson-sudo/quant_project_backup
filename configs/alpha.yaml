# alpha_0: prove ES baseline works
# alpha_1: prove same baseline works across ES/CL/ZB
# alpha_2: add feature expansion
# alpha_3: add HTF + meta + HMM after HMM is fixed
# alpha_4: production/paper/live only after stable positive out-of-sample results

active_profile: alpha_0

base:
  time_zone: "America/New_York"
  log_level: "INFO"

  data:
    root: "data/L0_ohlcv_1m"

  session:
    timezone: "America/New_York"
    session_start_local: "18:00"
    session_end_local: "16:00"
    session_break_start_local: "17:00"
    session_break_end_local: "18:00"

  features:
    resample_frequencies: ["1m"]
    drop_incomplete_rows: true
    roll_windows: [5, 10, 20]
    roll_window_min_rows: 20
    feature_transforms: ["lags", "ratios", "z_scores"]
    max_pairwise_interactions: 0
    max_cross_timeframe_interactions: 0
    htf_alignment_filter: false
    vol_median_window: 20
    vol_smooth_window: 5
    regime_high_thresh: 0.6
    regime_low_thresh: 0.4
    regime_missing_default: 0.0

  target:
    target_15m_horizon: 15
    target_scale_factor: 100.0

  discovery:
    discovery_window_days: 30
    bootstrap_folds: 3
    extra_trees_params:
      random_state: 42
      n_jobs: 1
      n_estimators: 50
      max_depth: 4
      max_features: 0.3
      bootstrap: false
    selection_freq_threshold: 0.50
    sign_consistency_threshold: 0.50
    cumulative_importance_threshold: 0.95
    min_selected_features: 5
    max_selected_features: 30

  walkforward:
    wf_train_days: 180
    wf_test_days: 30
    wf_step_days: 30
    mode: outer_split
    model_type: "Ridge"
    ridge_params:
      alpha: 1.0
      solver: "cholesky"
      fit_intercept: true
      random_state: 42
    probability_smoothing_alpha: 0.0
    corr_threshold: 0.99
    wf_parallel_folds: 1
    enable_meta_labeling: false
    meta_threshold: 0.5
    discovery_target: "target_sign_15m"
    walkforward_target: "target_sign_15m"

  execution:
    execute_at: "open[t+1]"
    slippage_k: 0.0
    vol_penalty: 0.0
    commission_per_trade: 0.0
    tx_cost_per_roundturn: 0.0
    commission_per_contract: 0.0
    target_vol: 0.01
    max_leverage: 1.0
    max_pos_change_per_min: 1.0
    flat_before_close_minutes: 5
    htf_trend_alignment: false
    htf_vol_scaling: false
    htf_vol_window: 10
    z_score_entry_threshold: 1.5
    target_risk_per_trade: 0.01
    stop_loss_pct: 0.0
    take_profit_pct: 0.0
    gap_slippage_pct: 0.0

  preprocessing:
    clip_min: -10.0
    clip_max: 10.0
    eps: 1.0e-09
    replace_inf_nan_with: 0.0
    remove_prediction_bias: false
    seed: 42

  io:
    row_group_size: 65536
    max_files: 20
    skip_completed: false

  pipeline:
    enable_discovery: true
    enable_expansion: false

  hmm:
    enabled: false
    n_iter: 30
    tol: 0.001

profiles:
  alpha_0:
    symbols:
      - ES
    data_years: 1
    folds: 1
    start_year: 2024
    end_year: 2024
    walkforward:
      model_type: "LogisticRegression"

  alpha_0_costs:
    symbols:
      - ES
    data_years: 1
    folds: 1
    start_year: 2024
    end_year: 2024
    walkforward:
      model_type: "LogisticRegression"
    execution:
      tx_cost_per_roundturn: 0.00015
      commission_per_contract: 1.50

  alpha_0_mes_costs:
    symbols:
      - MES
    data_years: 1
    folds: 1
    start_year: 2024
    end_year: 2024
    walkforward:
      model_type: "LogisticRegression"
    execution:
      tx_cost_per_roundturn: 0.00015
      commission_per_contract: 0.75

  alpha_1:
    symbols:
      - ES
      - CL
      - ZB
    data_years: 1
    folds: 1
    start_year: 2024
    end_year: 2024

  alpha_2:
    symbols:
      - ES
      - CL
      - ZB
    data_years: 3
    folds: 3
    start_year: 2022
    end_year: 2024

    features:
      roll_windows: [5, 10, 20, 50]
      feature_transforms: ["lags", "ratios", "z_scores", "pairwise_products_limited"]
      max_pairwise_interactions: 50

    discovery:
      discovery_window_days: 60
      bootstrap_folds: 10
      extra_trees_params:
        random_state: 42
        n_jobs: 1
        n_estimators: 100
        max_depth: 6
        max_features: 0.3
        bootstrap: false
      selection_freq_threshold: 0.60
      sign_consistency_threshold: 0.60
      min_selected_features: 10
      max_selected_features: 50

    pipeline:
      enable_expansion: true

  alpha_3:
    symbols:
      - ES
      - CL
      - ZB
    data_years: 5
    folds: 5
    start_year: 2020
    end_year: 2024

    features:
      resample_frequencies: ["5m", "1h"]
      roll_windows: [5, 10, 20, 50]
      roll_windows_1h: [2, 4, 6, 12]
      roll_windows_daily: [5, 10, 20]
      feature_transforms: ["lags", "ratios", "z_scores", "pairwise_products_limited", "cross_timeframe_ratios"]
      max_pairwise_interactions: 100
      max_cross_timeframe_interactions: 50
      htf_alignment_filter: true
      htf_trend_threshold: 0.1

    discovery:
      discovery_window_days: 90
      bootstrap_folds: 20
      extra_trees_params:
        random_state: 42
        n_jobs: 1
        n_estimators: 150
        max_depth: 6
        max_features: 0.3
        bootstrap: false
      selection_freq_threshold: 0.70
      sign_consistency_threshold: 0.70
      min_selected_features: 10
      max_selected_features: 75

    walkforward:
      enable_meta_labeling: true
      meta_threshold: 0.55

    execution:
      slippage_k: 0.00025
      vol_penalty: 0.0025
      tx_cost_per_roundturn: 0.00005
      htf_trend_alignment: true
      htf_vol_scaling: true

    pipeline:
      enable_expansion: true

    hmm:
      enabled: true
      n_iter: 30
      tol: 0.001

  alpha_4:
    symbols:
      - ES
      - CL
      - ZB
    data_years: 5
    folds: 5
    start_year: 2020
    end_year: 2024

    features:
      resample_frequencies: ["5m", "1h", "1d"]
      roll_windows: [5, 10, 20, 50]
      roll_windows_1h: [2, 4, 6, 12]
      roll_windows_daily: [5, 10, 20]
      feature_transforms: ["lags", "ratios", "z_scores", "pairwise_products_limited", "cross_timeframe_ratios"]
      max_pairwise_interactions: 100
      max_cross_timeframe_interactions: 50
      htf_alignment_filter: true
      htf_trend_threshold: 0.1

    discovery:
      discovery_window_days: 90
      bootstrap_folds: 20
      extra_trees_params:
        random_state: 42
        n_jobs: 1
        n_estimators: 150
        max_depth: 6
        max_features: 0.3
        bootstrap: false
      selection_freq_threshold: 0.70
      sign_consistency_threshold: 0.70
      min_selected_features: 10
      max_selected_features: 75

    walkforward:
      enable_meta_labeling: true
      meta_threshold: 0.55

    execution:
      slippage_k: 0.0005
      vol_penalty: 0.005
      tx_cost_per_roundturn: 0.00015
      commission_per_contract: 1.50
      htf_trend_alignment: true
      htf_vol_scaling: true
      max_position_size: "${ENV_MAX_POSITION_SIZE}"
      daily_loss_limit: "${ENV_DAILY_LOSS_LIMIT}"

    pipeline:
      enable_expansion: true

    hmm:
      enabled: true
      n_iter: 30
      tol: 0.001

    broker:
      api_key: "${ENV_BROKER_API_KEY}"
      api_secret: "${ENV_BROKER_API_SECRET}"
      endpoint: "${ENV_BROKER_ENDPOINT}"

    data:
      vendor_api_key: "${ENV_DATA_API_KEY}"
      vendor_endpoint: "${ENV_DATA_ENDPOINT}"
