# Shared defaults inherited by all per-market configs.
# Per-market files override only what differs.
metadata:
  exchange: "CME"

contract_specs:
  margin_requirement: null  # set per-market or via risk system

session_info:
  timezone: "America/Chicago"
  trading_hours_start: "17:00"
  trading_hours_end: "16:00"

risk:
  slippage_k: 0.001
  vol_penalty: 0.005
  max_leverage: 3.0
  max_position_size: 50