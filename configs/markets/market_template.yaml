# Market config schema — generate_markets.py populates concrete files from this.
# Fields NOT overridden per-market inherit from market_defaults.yaml.
metadata:
  ticker:       # e.g. "ES"
  exchange:     # inherited from defaults
  contract_multiplier: null

contract_specs:
  tick_size: null
  tick_value: null
  margin_requirement: null  # inherited from defaults if unset

session_info:
  timezone:             # inherited from defaults
  trading_hours_start:  # inherited from defaults
  trading_hours_end:    # inherited from defaults

risk:
  slippage_k:          # inherited from defaults
  vol_penalty:         # inherited from defaults
  max_leverage:        # inherited from defaults
  max_position_size:   # inherited from defaults