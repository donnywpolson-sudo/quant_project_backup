# ===================================================================
# LEAN ALPHA DISCOVERY MODE
# Optimized for speed, signal detection, and memory efficiency.
# ===================================================================

# Reduce to 3 uncorrelated asset classes to test for regime-agnostic alpha
markets:
  - ES  # Equity Index
  - CL  # Energy
  - ZB  # Rates (Treasuries)

# 1 year of recent, high-quality data is sufficient for a PoC
start_year: 2023
end_year: 2024

# Discovery: Drastically reduce complexity to avoid overfitting
discovery:
  discovery_window_days: 60
  bootstrap_folds: 5         # Prop firms use 30+ for final validation, 5 is enough for signal discovery
  extra_trees_params:
    random_state: 42
    n_jobs: 1
    n_estimators: 100
    max_depth: 6             # Shallower trees = faster training + less overfitting
    max_features: 0.3
    bootstrap: false
  selection_freq_threshold: 0.75
  sign_consistency_threshold: 0.8
  cumulative_importance_threshold: 0.95
  min_selected_features: 10
  max_selected_features: 100 # Reduced limit prevents feature bloat

features:
  # Reduce feature space to prevent OOM errors and noise
  max_pairwise_interactions: 100
  max_cross_timeframe_interactions: 50
  # Keep other settings as-is, but verify you aren't doing 500 interactions

# Execution: realistic friction parameters.
# Set all costs to 0 to simulate a frictionless environment.
execution:
  tx_cost_per_roundturn: 0.00015  # 1.5 bps per round-turn (entry + exit)

# Walkforward: Standard window, but fewer markets = much faster iterations
walkforward:
  wf_train_days: 60
  wf_test_days: 1
  wf_step_days: 5            # Step every 5 days instead of 1 to speed up execution by 5x
  ridge_params:
    alpha: 1.0
    solver: 'cholesky'
    fit_intercept: true
  model_type: 'Ridge'