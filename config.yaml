# ===================================================================
# QUANT PROJECT — Master Configuration
# ===================================================================
# All numeric / behavioural parameters are defined here so that
# nothing is hardcoded in quant/config.py.
# -------------------------------------------------------------------
# Sections:
#   data         — file paths, globs, output locations
#   memory       — RAM caps, chunk sizes, safety margins
#   session      — timezone, session hours (ETH pit session)
#   features     — resampling, rolling windows, transforms, HTF context, regime
#   target       — target horizon, scaling
#   discovery    — feature selection bootstrap, thresholds
#   walkforward  — training / testing splits, model, correlation pruning
#   execution    — slippage, costs, leverage, HTF alignment
#   preprocessing— clipping, epsilon, inf/nan replacement, seed
#   io           — row group size, max files, skip completed
#   universe     — market selection (legacy keys kept for backwards compat)
# ===================================================================

# =========================
# UNIVERSE / MARKET SELECTION
# =========================
all_markets:
  - ES
  - NQ
  - YM
  - RTY
  - CL
  - GC
  - SI
  - HG
  - ZN
  - ZB
  - 6E
  - 6J

markets:
  - ES

use_correlation_filter: false
correlation_threshold: 0.75
max_markets: 1

# =========================
# TIME RANGE (year-level)
# =========================
data_start_year: 2010
data_end_year: 2026
start_year: 2022
end_year: 2023

# =========================
# DATA — paths, globs, output locations
# =========================
data:
  data_glob: 'data/futures/*.parquet'
  manifest_path: 'artifacts/manifest.json'
  baseline_features_file: 'config/baseline_features.yaml'
  baseline_features_persist_path: 'artifacts/baseline_feature_matrix.parquet'
  trades_out: 'artifacts/trades.csv'
  log_dir: 'logs/'

# =========================
# MEMORY — RAM caps, chunk sizes, safety margins
# =========================
memory:
  ram_cap_bytes: 15032385536          # 14 * 1024**3
  rss_stop_bytes: 14495514624         # 13.5 * 1024**3
  rows_per_chunk_max: 5000000
  memory_safety_margin: 0.95
  memory_log_enabled: true

# =========================
# SESSION — timezone and ETH pit hours (local time, 24h)
# =========================
session:
  timezone: 'America/New_York'
  session_start_local: '18:00'        # Sunday–Thursday open
  session_end_local: '16:00'          # Monday–Friday close
  session_break_start_local: '17:00'  # daily maintenance break
  session_break_end_local: '18:00'

# =========================
# FEATURES — resampling, rolling, transforms, HTF context, regime
# =========================
features:
  resample_frequencies:
    - '5m'
    - '1h'
    - '1d'
  drop_incomplete_rows: true
  roll_windows: [5, 10, 20, 50]
  roll_windows_1h: [2, 4, 6, 12]
  roll_windows_daily: [5, 10, 20]
  roll_window_min_rows: 20
  feature_transforms:
    - 'lags'
    - 'ratios'
    - 'z_scores'
    - 'pairwise_products_limited'
    - 'cross_timeframe_ratios'
  max_pairwise_interactions: 500
  max_cross_timeframe_interactions: 200
  htf_trend_windows: [5, 10, 20]
  htf_volatility_windows: [5, 10, 20]
  htf_alignment_filter: true
  htf_trend_threshold: 0.1
  vol_median_window: 20
  vol_smooth_window: 5
  regime_high_thresh: 0.6
  regime_low_thresh: 0.4
  regime_missing_default: 0.0

# =========================
# TARGET — horizon and scaling
# =========================
target:
  target_5m_horizon: 1
  target_scale_factor: 100.0

# =========================
# DISCOVERY — feature selection bootstrap
# =========================
discovery:
  discovery_window_days: 60
  bootstrap_folds: 30
  extra_trees_params:
    random_state: 42
    n_jobs: 1
    n_estimators: 100
    max_depth: 8
    max_features: 0.3
    bootstrap: false
  selection_freq_threshold: 0.75
  sign_consistency_threshold: 0.8
  cumulative_importance_threshold: 0.95
  min_selected_features: 10
  max_selected_features: 1000

# =========================
# WALKFORWARD — train/test split, model, pruning
# =========================
walkforward:
  training_years: 1                 # legacy key — for year-based splits
  walkforward_years: 1              # legacy key — for year-based splits
  rolling: true                     # legacy key
  wf_train_days: 60
  wf_test_days: 1
  wf_step_days: 1
  ridge_params:
    alpha: 1.0
    solver: 'cholesky'
    fit_intercept: true
    random_state: 42
  model_type: 'Ridge'
  probability_smoothing_alpha: 0.1
  corr_threshold: 0.95
  wf_parallel_folds: 1

# =========================
# EXECUTION — slippage, costs, leverage, HTF alignment
# =========================
execution:
  execute_at: 'open[t+1]'
  slippage_k: 0.001
  vol_penalty: 0.005
  commission_per_trade: 2.0e-05
  target_vol: 0.01
  max_leverage: 3.0
  max_pos_change_per_min: 0.1
  flat_before_close_minutes: 5
  htf_trend_alignment: true
  htf_vol_scaling: true
  htf_vol_window: 10

# =========================
# PREPROCESSING — clipping, epsilon, seed, bias removal
# =========================
preprocessing:
  clip_min: -10.0
  clip_max: 10.0
  eps: 1.0e-09
  replace_inf_nan_with: 0.0
  remove_prediction_bias: false
  seed: 42

# =========================
# I/O — serialisation & workflow control
# =========================
io:
  row_group_size: 65536
  max_files: 20
  skip_completed: true