# ===================================================================
# FIRST-PASS ALPHA DETECTION — Minimum Viable Config
# Single market, single timeframe, frictionless.
# Purpose: determine IF there's signal before scaling up.
# Expected runtime: ~5-10 min on 1 core.
# ===================================================================

# --- Year-level split (used by run.py) ----------------------------------
training_years: 1
walkforward_years: 1

# --- Single market — fastest path ---------------------------------------
markets:
  - ES

# --- 6 months of recent data — enough to detect if alpha exists ---------
start_year: 2024
end_year: 2024

# --- Pipeline toggles ---------------------------------------------------
enable_discovery: true
enable_expansion: true

# --- Session (ETH pit, NYC) — keep defaults explicit --------------------
session:
  timezone: 'America/New_York'
  session_start_local: '18:00'
  session_end_local: '16:00'
  session_break_start_local: '17:00'
  session_break_end_local: '18:00'

# --- Single timeframe only — 5m bars; skip 1h/1d resampling -------------
# This is the #1 compute savings (~60% fewer bars processed).
features:
  resample_frequencies:
    - '5m'
  drop_incomplete_rows: true
  roll_windows: [5, 10, 20]           # reduced from [5,10,20,50]
  roll_window_min_rows: 20
  feature_transforms:
    - 'lags'
    - 'ratios'
    - 'z_scores'
  max_pairwise_interactions: 50        # halved from 100
  max_cross_timeframe_interactions: 0  # no HTF = no cross-frame features
  htf_alignment_filter: false          # disabled — no HTF data
  vol_median_window: 20
  vol_smooth_window: 5
  regime_high_thresh: 0.6
  regime_low_thresh: 0.4
  regime_missing_default: 0.0

# --- Target — same horizon ----------------------------------------------
target:
  target_5m_horizon: 1
  target_scale_factor: 100.0

# --- Discovery — minimal bootstrap for speed ----------------------------
discovery:
  discovery_window_days: 30            # halved from 60
  bootstrap_folds: 3                   # reduced from 5
  extra_trees_params:
    random_state: 42
    n_jobs: 1
    n_estimators: 50                   # halved from 100
    max_depth: 4                       # shallower = faster + less overfit
    max_features: 0.3
    bootstrap: false
  selection_freq_threshold: 0.75
  sign_consistency_threshold: 0.8
  cumulative_importance_threshold: 0.95
  min_selected_features: 5             # lower floor
  max_selected_features: 50            # tighter ceiling

# --- Walkforward — wider steps = fewer folds = faster -------------------
walkforward:
  wf_train_days: 30                    # halved from 60
  wf_test_days: 1
  wf_step_days: 10                     # stepped every 10 days (was 5)
  ridge_params:
    alpha: 1.0
    solver: 'cholesky'
    fit_intercept: true
    random_state: 42
  model_type: 'Ridge'
  probability_smoothing_alpha: 0.0     # disabled — skip smoothing pass
  corr_threshold: 0.99                 # minimal pruning
  wf_parallel_folds: 1

# --- Execution — frictionless (test signal, not execution quality) ------
execution:
  execute_at: 'open[t+1]'
  slippage_k: 0.0                      # zero slippage
  vol_penalty: 0.0                     # zero vol penalty
  tx_cost_per_roundturn: 0.0           # zero transaction cost
  commission_per_trade: 0.0
  target_vol: 1.0                      # no vol targeting
  max_leverage: 10.0                   # unconstrained
  max_pos_change_per_min: 1.0
  flat_before_close_minutes: 0         # no flattening
  htf_trend_alignment: false           # no HTF filter
  htf_vol_scaling: false               # no HTF vol scaling

# --- Preprocessing — standard bounds ------------------------------------
preprocessing:
  clip_min: -10.0
  clip_max: 10.0
  eps: 1.0e-09
  replace_inf_nan_with: 0.0
  remove_prediction_bias: false
  seed: 42

# --- I/O -----------------------------------------------------------------
io:
  row_group_size: 65536
  max_files: 20
  skip_completed: true