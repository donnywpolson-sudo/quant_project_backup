# Robustness tier: 5-year data, multi-fold, realistic friction
data_years: 5
folds: 5
start_year: 2019
end_year: 2024

discovery:
  bootstrap_folds: 30
  discovery_window_days: 60

walkforward:
  wf_train_days: 60
  wf_step_days: 1

execution:
  slippage_k: 0.0005
  vol_penalty: 0.005
  tx_cost_per_roundturn: 0.00015
  commission_per_trade: 2.0e-05
  max_leverage: 3.0
  htf_trend_alignment: true
  htf_vol_scaling: true